<div
  class="flex h-full flex-col gap-4 rounded-2xl border border-outline-variant bg-surface-container-low p-5 shadow-sm transition-shadow duration-200 hover:shadow-md sm:p-6"
>
  <div class="flex items-center gap-4">
    <div
      class="flex size-12 shrink-0 items-center justify-center rounded-xl"
      [class.bg-primary-container]="value().primary"
      [class.text-on-primary-container]="value().primary"
      [class.bg-surface-container-high]="!value().primary"
      [class.text-on-surface-variant]="!value().primary"
    >
      <mat-icon aria-hidden="true" [fontIcon]="value().nameIcon"></mat-icon>
    </div>
    <div class="min-w-0 flex-1">
      <h2 class="text-lg font-bold">{{ value().title }}</h2>
      <p class="text-sm text-muted-foreground">{{ value().subtitle }}</p>
    </div>
  </div>

  <div class="flex flex-1 flex-col justify-between gap-5">
    <p class="text-base text-on-surface-variant">
      {{ value().description }}
    </p>

    @if (value().primary) {
      <button
        type="button"
        [disabled]="disabled()"
        (click)="managerClickButton()"
        matButton="filled"
      >
        {{ value().nameButton }}
        <mat-icon iconPositionEnd aria-hidden="true" fontIcon="arrow_forward"></mat-icon>
      </button>
    } @else {
      <button
        type="button"
        [disabled]="disabled()"
        (click)="managerClickButton()"
        matButton="outlined"
      >
        {{ value().nameButton }}
        <mat-icon iconPositionEnd aria-hidden="true" fontIcon="arrow_forward"></mat-icon>
      </button>
    }
  </div>
</div>
