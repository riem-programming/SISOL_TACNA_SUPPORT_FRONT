<section class="flex-1 px-4 py-6 sm:px-6 sm:py-8 lg:px-8">
  <div class="mx-auto w-full max-w-4xl">
    <div class="mb-6 space-y-1 sm:mb-8">
      <h1 class="text-2xl font-bold sm:text-3xl">
        @if (currentUser()?.username) {
          Hola, {{ currentUser()?.username }}
        } @else {
          Panel de Control
        }
      </h1>
      <p class="text-base text-muted-foreground sm:text-lg">¿Qué necesitas hacer hoy?</p>
    </div>

    <div class="grid grid-cols-1 gap-4 sm:gap-6 md:grid-cols-2">
      <app-card [value]="valueCreateCard" (onClickButton)="navegateToCreateRequest()" />
      <app-card [value]="valueMyRequestCard" (onClickButton)="navegateToMyRequest()" />
    </div>
  </div>
</section>
