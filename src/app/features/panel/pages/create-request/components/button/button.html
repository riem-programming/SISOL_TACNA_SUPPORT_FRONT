<button
  (click)="managerClickButton()"
  class="w-full flex flex-col gap-6 rounded-xl shadow-sm cursor-pointer p-4 transition-all duration-200 border"
  [class.border-primary-border]="isActive()"
  [class.hover:border-primary-border/50]="!isActive()"
>
  <div class="flex gap-3" [class.flex-col]="!isHorizontal()" [class.items-center]="!isHorizontal()">
    <span class="text-2xl">
      {{ emoji() }}
    </span>
    <div class="flex-1 self-center" [class.text-start]="isHorizontal()">
      <h4 class="font-semibold">{{ title() }}</h4>
      <p class="hidden sm:block text-sm">{{ description() }}</p>
    </div>
    @if (isActive()) {
      <mat-icon class="icon-primary" aria-hidden="false" fontIcon="check_circle"></mat-icon>
    }
  </div>
</button>
