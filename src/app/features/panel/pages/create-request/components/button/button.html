<button
  type="button"
  (click)="managerClickButton()"
  class="option-card"
  [class.option-card-active]="isActive()"
  [attr.aria-pressed]="isActive()"
>
  <div
    class="flex w-full gap-3"
    [class.flex-col]="!isHorizontal()"
    [class.items-center]="!isHorizontal()"
  >
    <span class="text-3xl" aria-hidden="true">
      {{ emoji() }}
    </span>
    <div
      class="flex-1 self-center"
      [class.text-start]="isHorizontal()"
      [class.text-center]="!isHorizontal()"
    >
      <h4 class="text-base font-bold">{{ title() }}</h4>
      <p class="option-description">{{ description() }}</p>
    </div>
    @if (isActive()) {
      <mat-icon class="icon-primary shrink-0" aria-hidden="true">check_circle</mat-icon>
    }
  </div>
</button>
